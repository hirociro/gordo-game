<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bebé Sinclair - Skin Selector</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
    overflow-x: hidden;
  }
  h1 { margin-top: 18px; font-size: 1.8em; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
  .subtitle { font-size: 0.85em; opacity: 0.7; margin-bottom: 10px; }
  .stage {
    position: relative;
    width: 340px;
    height: 450px;
    margin: 8px auto;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  canvas { display: block; }
  .skin-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    max-width: 380px;
    padding: 10px;
  }
  .skin-btn {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 10px 6px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 0.75em;
    text-align: center;
    transition: all 0.2s;
  }
  .skin-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
  .skin-btn.active { border-color: #e94560; background: rgba(233,69,96,0.3); }
  .skin-btn .icon { font-size: 1.8em; display: block; margin-bottom: 4px; }
  .credits { margin-top: auto; padding: 12px; opacity: 0.4; font-size: 0.7em; }
</style>
</head>
<body>
<h1>Bebé Sinclair</h1>
<p class="subtitle">a.k.a. El Gordo Bolaños</p>
<div class="stage">
  <canvas id="c" width="340" height="450"></canvas>
</div>
<div class="skin-grid">
  <button class="skin-btn active" onclick="setSkin('toddler')"><span class="icon">👶</span>Bebé</button>
  <button class="skin-btn" onclick="setSkin('monje')"><span class="icon">🧘</span>Monje</button>
  <button class="skin-btn" onclick="setSkin('ciclista')"><span class="icon">🚴</span>Ciclista</button>
  <button class="skin-btn" onclick="setSkin('maraton')"><span class="icon">🏃</span>Maratón</button>
  <button class="skin-btn" onclick="setSkin('jurassic')"><span class="icon">🦖</span>Jurassic</button>
  <button class="skin-btn" onclick="setSkin('torero')"><span class="icon">🇪🇸</span>Torero</button>
  <button class="skin-btn" onclick="setSkin('f1')"><span class="icon">🏎️</span>F1 Ferrari</button>
  <button class="skin-btn" onclick="setSkin('base')"><span class="icon">🦕</span>Desnudo</button>
</div>
<p class="credits">Hecho con cariño para el grupo Debates</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 340, H = 450;
let currentSkin = 'toddler';
let mouthPhase = 0;
let bounce = 0, bounceDir = 1;
let dinoImg = null;
let loaded = false;

const img = new Image();
img.crossOrigin = 'anonymous';
img.onload = () => { dinoImg = img; loaded = true; };
img.onerror = () => {
  const img2 = new Image();
  img2.onload = () => { dinoImg = img2; loaded = true; };
  img2.src = 'https://i.pinimg.com/736x/83/19/bf/8319bf3730ce8c53879cff89943eef90.jpg';
};
img.src = 'baby.jpg';

function setSkin(s) {
  currentSkin = s;
  document.querySelectorAll('.skin-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

/*
  Image: 736x717 → Canvas: 340x331, offsetY=50
  Baby Sinclair fills nearly the ENTIRE image edge-to-edge.
  
  PIXEL-VERIFIED landmarks on 340x450 canvas:
  - Eyes: y≈158-165, left eye x≈148, right eye x≈180 → face center x≈164
  - Mouth: y≈185-194
  - Dark line (neck?): y≈189
  - Head occupies roughly y=50 to y=200
  - Body/torso: y=200 to y=320 (fills full width ~20 to ~320)
  - Legs/feet: y=320 to y=380
  - The character fills almost the entire 340px width
*/
const L = {
  faceCX: 164,         // face center X (between the eyes)
  bodyCX: 170,         // body center X
  headTopY: 55,        // very top of head on canvas
  foreheadY: 110,      // forehead area
  eyeY: 160,           // eye line
  noseY: 175,          // nose
  mouthY: 190,         // mouth
  chinY: 210,          // chin / jaw
  neckY: 220,          // neck
  shoulderY: 235,      // shoulder line
  chestY: 260,         // mid-chest
  bellyY: 285,         // belly
  waistY: 300,         // waist
  hipY: 320,           // hips
  crotchY: 340,        // crotch
  kneeY: 355,          // knees
  feetY: 375,          // feet
  // Body is WIDE - nearly full canvas
  bodyLeft: 40,        // left edge of torso at chest level
  bodyRight: 300,      // right edge of torso at chest level
  torsoHalf: 130,      // half-width of torso (MUCH wider than before)
  headLeft: 95,        // left edge of head
  headRight: 240,      // right edge of head
  headHalf: 72,        // half-width of head
};

function drawBackground() {
  const bgs = {
    toddler: ['#ffe6f0','#ffd6e7'], monje: ['#2d1b00','#5c3a1e'],
    ciclista: ['#e0f7fa','#80deea'], maraton: ['#fff3e0','#ffcc80'],
    jurassic: ['#1b5e20','#2e7d32'], torero: ['#b71c1c','#e53935'],
    f1: ['#37474f','#263238'], base: ['#a5d6a7','#66bb6a']
  };
  const bg = bgs[currentSkin] || bgs.base;
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, bg[0]); grd.addColorStop(1, bg[1]);
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
}

function drawSceneDecor() {
  if (currentSkin === 'jurassic') {
    ctx.fillStyle = '#2e7d32';
    for (let i = 0; i < 6; i++) {
      const tx = i * 65 + 15;
      ctx.fillRect(tx, 15, 6, 35);
      ctx.beginPath(); ctx.arc(tx + 3, 12, 18, 0, Math.PI * 2); ctx.fill();
    }
    ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 3;
    for (let i = 0; i < 9; i++) ctx.strokeRect(i * 42 + 5, H - 65, 4, 35);
    ctx.beginPath(); ctx.moveTo(0, H - 50); ctx.lineTo(W, H - 50); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, H - 35); ctx.lineTo(W, H - 35); ctx.stroke();
  }
  if (currentSkin === 'f1') {
    ctx.fillStyle = '#424242'; ctx.fillRect(0, H - 55, W, 55);
    ctx.setLineDash([18, 12]); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, H - 28); ctx.lineTo(W, H - 28); ctx.stroke();
    ctx.setLineDash([]);
    const sz = 10;
    for (let r = 0; r < 2; r++) for (let c = 0; c < Math.ceil(W/sz); c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? '#fff' : '#111';
      ctx.fillRect(c * sz, r * sz, sz, sz);
    }
  }
  if (currentSkin === 'torero') {
    ctx.fillStyle = '#d4a056'; ctx.fillRect(0, H - 65, W, 65);
    ctx.fillStyle = '#c49046';
    ctx.beginPath(); ctx.ellipse(W/2, H - 48, 155, 25, 0, 0, Math.PI * 2); ctx.fill();
  }
  if (currentSkin === 'maraton') {
    ctx.fillStyle = '#616161'; ctx.fillRect(0, H - 50, W, 50);
    ctx.setLineDash([12, 8]); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, H - 25); ctx.lineTo(W, H - 25); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#1565c0'; ctx.fillRect(0, 0, W, 22);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('META - 42.195 KM', W/2, 16);
  }
  if (currentSkin === 'ciclista') {
    ctx.fillStyle = '#4dd0e1';
    ctx.beginPath();
    ctx.moveTo(0, 80); ctx.lineTo(55, 20); ctx.lineTo(110, 65);
    ctx.lineTo(170, 15); ctx.lineTo(240, 55); ctx.lineTo(310, 30); ctx.lineTo(W, 75);
    ctx.lineTo(W, 110); ctx.lineTo(0, 110); ctx.fill();
    ctx.fillStyle = '#616161'; ctx.fillRect(0, H - 40, W, 40);
  }
  if (currentSkin === 'monje') {
    ctx.fillStyle = '#4e342e'; ctx.fillRect(0, H - 40, W, 40);
    ctx.strokeStyle = 'rgba(255,255,255,0.10)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(W/2, H/2, 110, -0.3, Math.PI * 1.7); ctx.stroke();
    for (let x of [30, W - 30]) {
      ctx.fillStyle = '#fff3e0'; ctx.fillRect(x - 3, H - 62, 5, 22);
      ctx.fillStyle = '#ff9800'; ctx.beginPath(); ctx.ellipse(x, H - 66, 4, 6, 0, 0, Math.PI * 2); ctx.fill();
    }
  }
}

function drawDinoImage() {
  if (!dinoImg) return;
  const scale = W / dinoImg.naturalWidth;
  const drawH2 = dinoImg.naturalHeight * scale;
  const offsetY = (H - drawH2) / 2 - 10;
  bounce += 0.35 * bounceDir;
  if (bounce > 3 || bounce < -3) bounceDir *= -1;
  ctx.save();
  ctx.translate(0, bounce);
  ctx.drawImage(dinoImg, 0, offsetY, W, drawH2);
  ctx.restore();
}

function drawClothing() {
  const by = bounce;
  ctx.save();
  ctx.translate(0, by);

  const cx = L.bodyCX;
  const fcx = L.faceCX;
  const bL = L.bodyLeft;
  const bR = L.bodyRight;
  const bW = bR - bL; // full body width ~260px

  // ============ TODDLER (bib) ============
  if (currentSkin === 'toddler') {
    ctx.fillStyle = 'rgba(255, 215, 0, 0.88)';
    ctx.beginPath();
    ctx.moveTo(fcx - 40, L.neckY);
    ctx.lineTo(fcx + 40, L.neckY);
    ctx.lineTo(fcx + 35, L.chestY + 10);
    ctx.arc(fcx, L.chestY + 10, 35, 0, Math.PI);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(200, 160, 0, 0.9)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#c62828';
    ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('NOT THE', fcx, L.shoulderY);
    ctx.fillText('MAMA!', fcx, L.shoulderY + 16);
  }

  // ============ MONJE (monk robe) ============
  if (currentSkin === 'monje') {
    // Full robe covering the body
    ctx.fillStyle = 'rgba(93, 64, 55, 0.78)';
    ctx.beginPath();
    ctx.moveTo(bL + 10, L.shoulderY);
    ctx.lineTo(bR - 10, L.shoulderY);
    ctx.lineTo(bR, L.hipY);
    ctx.lineTo(bR - 20, L.feetY);
    ctx.lineTo(bL + 20, L.feetY);
    ctx.lineTo(bL, L.hipY);
    ctx.closePath(); ctx.fill();
    // Rope belt
    ctx.strokeStyle = '#d7ccc8'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(bL + 5, L.waistY);
    ctx.lineTo(bR - 5, L.waistY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + 30, L.waistY);
    ctx.quadraticCurveTo(cx + 35, L.waistY + 20, cx + 25, L.waistY + 35); ctx.stroke();
    // Hood on head
    ctx.fillStyle = 'rgba(93, 64, 55, 0.72)';
    ctx.beginPath();
    ctx.moveTo(L.headLeft - 5, L.eyeY - 10);
    ctx.quadraticCurveTo(fcx, L.headTopY - 30, L.headRight + 5, L.eyeY - 10);
    ctx.lineTo(L.headRight + 8, L.eyeY + 5);
    ctx.quadraticCurveTo(fcx, L.headTopY - 15, L.headLeft - 8, L.eyeY + 5);
    ctx.closePath(); ctx.fill();
  }

  // ============ CICLISTA ============
  if (currentSkin === 'ciclista') {
    // Yellow jersey covering torso
    ctx.fillStyle = 'rgba(253, 216, 53, 0.80)';
    ctx.beginPath();
    ctx.moveTo(bL + 15, L.shoulderY);
    ctx.lineTo(bR - 15, L.shoulderY);
    ctx.lineTo(bR - 10, L.bellyY);
    ctx.lineTo(bL + 10, L.bellyY);
    ctx.closePath(); ctx.fill();
    // Stripes
    ctx.fillStyle = 'rgba(245, 127, 23, 0.75)';
    ctx.fillRect(bL + 15, L.chestY - 5, bW - 30, 8);
    ctx.fillRect(bL + 15, L.chestY + 18, bW - 30, 8);
    // Number
    ctx.fillStyle = '#212121'; ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('69', cx, L.chestY - 10);
    // Black shorts
    ctx.fillStyle = 'rgba(33, 33, 33, 0.75)';
    ctx.fillRect(bL + 12, L.bellyY, bW - 24, L.hipY - L.bellyY + 10);
    // Aero helmet
    ctx.fillStyle = 'rgba(38, 50, 56, 0.85)';
    ctx.beginPath();
    ctx.ellipse(fcx, L.foreheadY - 15, L.headHalf + 8, 35, 0, Math.PI, 0); ctx.fill();
    // Helmet tail
    ctx.beginPath();
    ctx.moveTo(fcx + 40, L.foreheadY - 40);
    ctx.quadraticCurveTo(fcx + 80, L.foreheadY - 45, fcx + 65, L.foreheadY - 20);
    ctx.lineTo(fcx + 45, L.foreheadY - 15);
    ctx.closePath(); ctx.fill();
    // Visor
    ctx.fillStyle = 'rgba(0, 188, 212, 0.35)';
    ctx.beginPath(); ctx.ellipse(fcx, L.foreheadY - 5, L.headHalf + 5, 8, 0, 0, Math.PI); ctx.fill();
  }

  // ============ MARATON ============
  if (currentSkin === 'maraton') {
    // Running singlet (narrower straps)
    ctx.fillStyle = 'rgba(229, 57, 53, 0.78)';
    ctx.beginPath();
    ctx.moveTo(bL + 25, L.shoulderY);
    ctx.lineTo(bR - 25, L.shoulderY);
    ctx.lineTo(bR - 15, L.bellyY);
    ctx.lineTo(bL + 15, L.bellyY);
    ctx.closePath(); ctx.fill();
    // Race bib
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 30, L.chestY - 10, 60, 32);
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 0.5;
    ctx.strokeRect(cx - 30, L.chestY - 10, 60, 32);
    ctx.fillStyle = '#000'; ctx.font = 'bold 18px monospace'; ctx.textAlign = 'center';
    ctx.fillText('502', cx, L.chestY + 15);
    // Shorts
    ctx.fillStyle = 'rgba(26, 35, 126, 0.75)';
    ctx.fillRect(bL + 15, L.bellyY, bW - 30, L.hipY - L.bellyY + 10);
    // Headband
    ctx.fillStyle = 'rgba(229, 57, 53, 0.85)';
    ctx.fillRect(L.headLeft - 5, L.foreheadY, L.headRight - L.headLeft + 10, 9);
    // Sweat drops
    ctx.fillStyle = 'rgba(41, 182, 246, 0.55)';
    const sw = (Date.now() / 15) % 60;
    ctx.beginPath(); ctx.arc(L.headLeft - 3, L.foreheadY + 15 + sw, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(L.headRight + 5, L.foreheadY + 20 + sw * 0.6, 2.5, 0, Math.PI * 2); ctx.fill();
  }

  // ============ JURASSIC PARK ============
  if (currentSkin === 'jurassic') {
    // Khaki utility vest - big and wide
    ctx.fillStyle = 'rgba(161, 136, 127, 0.80)';
    ctx.beginPath();
    ctx.moveTo(bL + 10, L.shoulderY);
    ctx.lineTo(bR - 10, L.shoulderY);
    ctx.lineTo(bR - 5, L.hipY - 10);
    ctx.lineTo(bL + 5, L.hipY - 10);
    ctx.closePath(); ctx.fill();
    // Vest center opening
    ctx.strokeStyle = '#795548'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx, L.shoulderY); ctx.lineTo(cx, L.hipY - 10); ctx.stroke();
    // Chest pockets
    ctx.strokeStyle = '#795548'; ctx.lineWidth = 1.5;
    ctx.strokeRect(bL + 20, L.chestY, 40, 25);
    ctx.strokeRect(bR - 60, L.chestY, 40, 25);
    ctx.fillStyle = 'rgba(121, 85, 72, 0.4)';
    ctx.fillRect(bL + 20, L.chestY, 40, 6);
    ctx.fillRect(bR - 60, L.chestY, 40, 6);
    // InGen badge
    ctx.fillStyle = '#fff'; ctx.fillRect(bR - 75, L.shoulderY + 5, 35, 16);
    ctx.fillStyle = '#e53935'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('InGen', bR - 58, L.shoulderY + 17);
    // Khaki shorts
    ctx.fillStyle = 'rgba(188, 170, 164, 0.75)';
    ctx.fillRect(bL + 10, L.hipY - 10, bW - 20, L.crotchY - L.hipY + 15);
    // Safari hat - wide brim
    ctx.fillStyle = 'rgba(141, 110, 99, 0.85)';
    ctx.beginPath(); ctx.ellipse(fcx, L.foreheadY - 18, L.headHalf + 25, 12, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(121, 85, 72, 0.88)';
    ctx.beginPath(); ctx.ellipse(fcx, L.foreheadY - 28, L.headHalf + 5, 22, 0, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#4e342e'; ctx.fillRect(fcx - L.headHalf - 5, L.foreheadY - 22, (L.headHalf + 5) * 2, 5);
  }

  // ============ TORERO ============
  if (currentSkin === 'torero') {
    // Traje de luces jacket
    ctx.fillStyle = 'rgba(183, 28, 28, 0.80)';
    ctx.beginPath();
    ctx.moveTo(bL + 10, L.shoulderY);
    ctx.lineTo(bR - 10, L.shoulderY);
    ctx.lineTo(bR - 15, L.waistY + 5);
    ctx.lineTo(bL + 15, L.waistY + 5);
    ctx.closePath(); ctx.fill();
    // Gold embroidery
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2.5;
    ctx.strokeRect(bL + 12, L.shoulderY + 2, bW - 24, L.waistY - L.shoulderY);
    ctx.beginPath(); ctx.moveTo(cx, L.shoulderY + 2); ctx.lineTo(cx, L.waistY + 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bL + 30, L.chestY); ctx.lineTo(bR - 30, L.chestY); ctx.stroke();
    // Epaulettes
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(bL + 8, L.shoulderY + 5, 12, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(bR - 8, L.shoulderY + 5, 12, 0, Math.PI * 2); ctx.fill();
    // Gold tassels
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1.5;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath(); ctx.moveTo(bL + 2 + i * 4, L.shoulderY + 16);
      ctx.lineTo(bL + 2 + i * 4, L.shoulderY + 28); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bR - 14 + i * 4, L.shoulderY + 16);
      ctx.lineTo(bR - 14 + i * 4, L.shoulderY + 28); ctx.stroke();
    }
    // Tight pants
    ctx.fillStyle = 'rgba(136, 14, 79, 0.78)';
    ctx.fillRect(bL + 15, L.waistY + 5, bW - 30, L.crotchY - L.waistY + 5);
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(bL + 15, L.waistY + 5, 4, L.crotchY - L.waistY + 5);
    ctx.fillRect(bR - 19, L.waistY + 5, 4, L.crotchY - L.waistY + 5);
    // Montera hat
    ctx.fillStyle = 'rgba(26, 26, 26, 0.85)';
    ctx.beginPath(); ctx.ellipse(fcx, L.foreheadY - 12, L.headHalf + 8, 14, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(fcx, L.foreheadY - 25, L.headHalf - 5, 22, 0, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.arc(fcx - L.headHalf - 5, L.foreheadY - 5, 10, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(fcx + L.headHalf + 5, L.foreheadY - 5, 10, 0, Math.PI * 2); ctx.fill();
    // Cape (animated)
    const capeSwing = Math.sin(Date.now() / 400) * 15;
    ctx.fillStyle = 'rgba(233, 30, 99, 0.45)';
    ctx.beginPath();
    ctx.moveTo(bR, L.shoulderY + 10);
    ctx.quadraticCurveTo(W + 30, L.bellyY + capeSwing, W - 10, L.feetY);
    ctx.quadraticCurveTo(bR + 20, L.feetY - 30, bR, L.waistY + 15);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255, 215, 0, 0.2)';
    ctx.beginPath();
    ctx.moveTo(bR + 5, L.shoulderY + 20);
    ctx.quadraticCurveTo(W + 20, L.bellyY + capeSwing * 0.7, W - 20, L.feetY - 10);
    ctx.quadraticCurveTo(bR + 15, L.feetY - 35, bR + 5, L.waistY + 20);
    ctx.closePath(); ctx.fill();
  }

  // ============ F1 FERRARI ============
  if (currentSkin === 'f1') {
    // Full race suit
    ctx.fillStyle = 'rgba(211, 47, 47, 0.80)';
    ctx.beginPath();
    ctx.moveTo(bL + 10, L.shoulderY);
    ctx.lineTo(bR - 10, L.shoulderY);
    ctx.lineTo(bR - 5, L.crotchY + 5);
    ctx.lineTo(bL + 5, L.crotchY + 5);
    ctx.closePath(); ctx.fill();
    // White center stripe
    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    ctx.fillRect(cx - 6, L.shoulderY, 12, L.crotchY - L.shoulderY + 5);
    // Ferrari text
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Ferrari', cx, L.shoulderY + 18);
    // Scuderia badge
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(cx, L.chestY + 8, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#b71c1c'; ctx.font = '16px sans-serif';
    ctx.fillText('🐴', cx, L.chestY + 14);
    // Sponsors
    ctx.fillStyle = 'rgba(255,255,255,0.75)'; ctx.font = '9px sans-serif';
    ctx.fillText('Shell', cx - 50, L.waistY - 5);
    ctx.fillText('UPS', cx + 50, L.waistY - 5);
    // Race helmet
    ctx.fillStyle = 'rgba(211, 47, 47, 0.88)';
    ctx.beginPath();
    ctx.ellipse(fcx, L.foreheadY - 10, L.headHalf + 10, 38, 0, Math.PI, 0); ctx.fill();
    // Visor
    ctx.fillStyle = 'rgba(33, 33, 33, 0.5)';
    ctx.beginPath();
    ctx.ellipse(fcx, L.foreheadY + 2, L.headHalf + 5, 12, 0, -0.1, Math.PI + 0.1); ctx.fill();
    // Number on helmet
    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('16', fcx, L.foreheadY - 20);
    // Visor reflection
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath(); ctx.ellipse(fcx - 15, L.foreheadY - 2, 18, 5, -0.3, 0, Math.PI * 2); ctx.fill();
  }

  ctx.restore();

  // ===== SPEECH BUBBLE =====
  mouthPhase += 0.03;
  const talking = Math.sin(mouthPhase * 3) > 0.3;
  const phrases = {
    toddler: '¡No soy\nel mamá!', monje: 'Om...\nnamaste',
    ciclista: '¡Allez\nallez!', maraton: '¡Ya casi\nllego!',
    jurassic: '¡Clever\ngirl!', torero: '¡Olé!\n¡Torero!',
    f1: '¡Forza\nFerrari!', base: '¡Soy el\nGordo!'
  };
  if (talking) {
    const bx = L.headRight + 10, byy = L.headTopY + by;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(bx - 5, byy + 35);
    ctx.lineTo(bx - 18, byy + 50);
    ctx.lineTo(bx + 5, byy + 42);
    ctx.closePath(); ctx.fill();
    roundRect(ctx, bx - 5, byy - 5, 105, 42, 10); ctx.fill();
    ctx.fillStyle = '#333'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    const lines = (phrases[currentSkin] || '').split('\n');
    lines.forEach((line, i) => ctx.fillText(line, bx + 47, byy + 13 + i * 15));
  }

  // ===== LABEL =====
  const labels = {
    toddler: 'BEBÉ SINCLAIR', monje: 'MONJE ZEN', ciclista: 'CICLISTA PRO',
    maraton: 'MARATONISTA', jurassic: 'EXPLORER', torero: 'EL TORERO',
    f1: 'SCUDERIA GORDO', base: 'AL NATURAL'
  };
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  roundRect(ctx, W/2 - 75, H - 38, 150, 30, 8); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(labels[currentSkin] || '', W/2, H - 18);
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath(); c.moveTo(x + r, y); c.lineTo(x + w - r, y);
  c.arcTo(x + w, y, x + w, y + r, r); c.lineTo(x + w, y + h - r);
  c.arcTo(x + w, y + h, x + w - r, y + h, r); c.lineTo(x + r, y + h);
  c.arcTo(x, y + h, x, y + h - r, r); c.lineTo(x, y + r);
  c.arcTo(x, y, x + r, y, r); c.closePath();
}

function animate() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawSceneDecor();
  if (loaded) { drawDinoImage(); drawClothing(); }
  else {
    ctx.fillStyle = '#fff'; ctx.font = '15px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Cargando al Gordo...', W/2, H/2);
  }
  requestAnimationFrame(animate);
}
animate();
</script>
