<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bebé Sinclair - Skin Selector</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
    overflow-x: hidden;
  }
  h1 { margin-top: 18px; font-size: 1.8em; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
  .subtitle { font-size: 0.85em; opacity: 0.7; margin-bottom: 10px; }
  .stage {
    position: relative;
    width: 340px;
    height: 450px;
    margin: 8px auto;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  canvas { display: block; }
  .skin-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    max-width: 380px;
    padding: 10px;
  }
  .skin-btn {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 10px 6px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 0.75em;
    text-align: center;
    transition: all 0.2s;
  }
  .skin-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
  .skin-btn.active { border-color: #e94560; background: rgba(233,69,96,0.3); }
  .skin-btn .icon { font-size: 1.8em; display: block; margin-bottom: 4px; }
  .credits { margin-top: auto; padding: 12px; opacity: 0.4; font-size: 0.7em; }
  .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 1.2em; }
</style>
</head>
<body>
<h1>Bebé Sinclair</h1>
<p class="subtitle">a.k.a. El Gordo Bolaños</p>
<div class="stage">
  <canvas id="c" width="340" height="450"></canvas>
  <div class="loading" id="loader">Cargando...</div>
</div>
<div class="skin-grid">
  <button class="skin-btn active" onclick="setSkin('toddler')"><span class="icon">👶</span>Bebé</button>
  <button class="skin-btn" onclick="setSkin('monje')"><span class="icon">🧘</span>Monje</button>
  <button class="skin-btn" onclick="setSkin('ciclista')"><span class="icon">🚴</span>Ciclista</button>
  <button class="skin-btn" onclick="setSkin('maraton')"><span class="icon">🏃</span>Maratón</button>
  <button class="skin-btn" onclick="setSkin('jurassic')"><span class="icon">🦖</span>Jurassic</button>
  <button class="skin-btn" onclick="setSkin('torero')"><span class="icon">🇪🇸</span>Torero</button>
  <button class="skin-btn" onclick="setSkin('f1')"><span class="icon">🏎️</span>F1 Ferrari</button>
  <button class="skin-btn" onclick="setSkin('base')"><span class="icon">🦕</span>Desnudo</button>
</div>
<p class="credits">Hecho con cariño para el grupo Debates</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 340, H = 450;
let currentSkin = 'toddler';
let mouthPhase = 0;
let bounce = 0, bounceDir = 1;
let dinoImg = null;
let loaded = false;

// Load baby sinclair image
const img = new Image();
img.crossOrigin = 'anonymous';
img.onload = () => {
  dinoImg = img;
  loaded = true;
  document.getElementById('loader').style.display = 'none';
};
img.onerror = () => {
  // fallback: try without crossOrigin
  const img2 = new Image();
  img2.onload = () => { dinoImg = img2; loaded = true; document.getElementById('loader').style.display = 'none'; };
  img2.src = img.src;
};
img.src = 'https://i.pinimg.com/736x/83/19/bf/8319bf3730ce8c53879cff89943eef90.jpg';

function setSkin(s) {
  currentSkin = s;
  document.querySelectorAll('.skin-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

// Baby sinclair proportions in the image (approximate):
// The image is roughly 736x736. Baby takes up most of frame.
// Head center ~50%, ~30% from top. Body center ~50%, ~65%.
// We scale to fit canvas.

// Drawing coordinates (relative to our canvas)
// We'll draw the image centered, scaled to fill width
const IMG_W = 736, IMG_H = 736;

function getDrawParams() {
  const scale = W / IMG_W;
  const drawW = W;
  const drawH = IMG_H * scale;
  const offsetY = (H - drawH) / 2 - 10;
  return { scale, drawW, drawH, offsetY };
}

// Character landmarks (in canvas coords, approximate)
function getLandmarks() {
  const { scale, offsetY } = getDrawParams();
  return {
    headCX: W * 0.48,
    headTopY: offsetY + 50 * scale,
    headCY: offsetY + 190 * scale,
    shoulderY: offsetY + 310 * scale,
    bodyCX: W * 0.48,
    bodyCY: offsetY + 420 * scale,
    bodyW: 180 * scale,
    waistY: offsetY + 480 * scale,
    leftArmX: W * 0.25,
    rightArmX: W * 0.72,
    armY: offsetY + 350 * scale,
    feetY: offsetY + 620 * scale,
    headR: 120 * scale,
  };
}

function drawBackground() {
  const bgs = {
    toddler: ['#ffe6f0','#ffd6e7'],
    monje: ['#2d1b00','#5c3a1e'],
    ciclista: ['#e0f7fa','#80deea'],
    maraton: ['#fff3e0','#ffcc80'],
    jurassic: ['#1b5e20','#2e7d32'],
    torero: ['#b71c1c','#e53935'],
    f1: ['#37474f','#263238'],
    base: ['#a5d6a7','#66bb6a']
  };
  const bg = bgs[currentSkin] || bgs.base;
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, bg[0]);
  grd.addColorStop(1, bg[1]);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

function drawSceneBackground() {
  const lm = getLandmarks();

  if (currentSkin === 'jurassic') {
    ctx.fillStyle = '#2e7d32';
    for (let i = 0; i < 6; i++) {
      const tx = i * 65 + 15;
      ctx.fillRect(tx, 60, 7, 50);
      ctx.beginPath(); ctx.arc(tx + 3, 55, 22, 0, Math.PI * 2); ctx.fill();
    }
    ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 3;
    for (let i = 0; i < 8; i++) ctx.strokeRect(i * 46 + 8, H - 80, 5, 45);
    ctx.beginPath(); ctx.moveTo(0, H - 65); ctx.lineTo(W, H - 65); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, H - 45); ctx.lineTo(W, H - 45); ctx.stroke();
  }
  if (currentSkin === 'f1') {
    ctx.fillStyle = '#424242'; ctx.fillRect(0, H - 70, W, 70);
    ctx.setLineDash([20, 15]); ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(0, H - 35); ctx.lineTo(W, H - 35); ctx.stroke();
    ctx.setLineDash([]);
    // Checkered flag at top
    const sz = 12;
    for (let r = 0; r < 2; r++) for (let c = 0; c < Math.ceil(W/sz); c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? '#fff' : '#000';
      ctx.fillRect(c * sz, r * sz, sz, sz);
    }
  }
  if (currentSkin === 'torero') {
    ctx.fillStyle = '#d4a056'; ctx.fillRect(0, H - 80, W, 80);
    ctx.fillStyle = '#c49046';
    ctx.beginPath(); ctx.ellipse(W/2, H - 60, 160, 30, 0, 0, Math.PI * 2); ctx.fill();
    // Arena stands
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(0, 0, W, 35);
    ctx.fillStyle = '#ffcc80';
    for (let i = 0; i < 12; i++) {
      ctx.beginPath(); ctx.arc(i * 30 + 15, 18, 5, 0, Math.PI * 2); ctx.fill();
    }
  }
  if (currentSkin === 'maraton') {
    // Road
    ctx.fillStyle = '#616161'; ctx.fillRect(0, H - 60, W, 60);
    ctx.setLineDash([15, 10]); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, H - 30); ctx.lineTo(W, H - 30); ctx.stroke();
    ctx.setLineDash([]);
    // Finish banner
    ctx.fillStyle = '#1565c0'; ctx.fillRect(0, 0, W, 28);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('META - 42.195 KM', W/2, 19);
  }
  if (currentSkin === 'ciclista') {
    // Mountains
    ctx.fillStyle = '#4dd0e1';
    ctx.beginPath();
    ctx.moveTo(0, 120); ctx.lineTo(60, 40); ctx.lineTo(120, 100);
    ctx.lineTo(180, 30); ctx.lineTo(250, 90); ctx.lineTo(320, 50); ctx.lineTo(W, 110);
    ctx.lineTo(W, 150); ctx.lineTo(0, 150); ctx.fill();
    ctx.fillStyle = '#616161'; ctx.fillRect(0, H - 50, W, 50);
    // Road marking
    ctx.setLineDash([12, 8]); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, H - 25); ctx.lineTo(W, H - 25); ctx.stroke();
    ctx.setLineDash([]);
  }
  if (currentSkin === 'monje') {
    // Temple floor
    ctx.fillStyle = '#4e342e'; ctx.fillRect(0, H - 50, W, 50);
    // Zen circle
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(W/2, H/2, 130, -0.3, Math.PI * 1.7); ctx.stroke();
    // Candles
    for (let i of [40, W - 40]) {
      ctx.fillStyle = '#fff3e0'; ctx.fillRect(i - 4, H - 80, 8, 30);
      ctx.fillStyle = '#ff9800';
      ctx.beginPath(); ctx.ellipse(i, H - 85, 5, 8, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffeb3b';
      ctx.beginPath(); ctx.ellipse(i, H - 87, 3, 5, 0, 0, Math.PI * 2); ctx.fill();
    }
  }
}

function drawDinoImage() {
  if (!dinoImg) return;
  const { scale, drawW, drawH, offsetY } = getDrawParams();
  bounce += 0.5 * bounceDir;
  if (bounce > 4 || bounce < -4) bounceDir *= -1;
  ctx.save();
  ctx.translate(0, bounce);
  ctx.drawImage(dinoImg, 0, offsetY, drawW, drawH);
  ctx.restore();
}

function drawSkinOverlays() {
  const { scale, offsetY } = getDrawParams();
  const lm = getLandmarks();
  const by = bounce;

  ctx.save();
  ctx.translate(0, by);

  if (currentSkin === 'toddler') {
    // Bib on chest
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.moveTo(lm.bodyCX - 30, lm.shoulderY + 5);
    ctx.lineTo(lm.bodyCX + 30, lm.shoulderY + 5);
    ctx.lineTo(lm.bodyCX + 22, lm.shoulderY + 45);
    ctx.lineTo(lm.bodyCX - 22, lm.shoulderY + 45);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#e53935';
    ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('NOT THE', lm.bodyCX, lm.shoulderY + 22);
    ctx.fillText('MAMA!', lm.bodyCX, lm.shoulderY + 35);
  }

  if (currentSkin === 'monje') {
    // Robe overlay on body
    ctx.fillStyle = 'rgba(93, 64, 55, 0.85)';
    ctx.beginPath();
    ctx.moveTo(lm.bodyCX - 55, lm.shoulderY);
    ctx.lineTo(lm.bodyCX + 55, lm.shoulderY);
    ctx.lineTo(lm.bodyCX + 48, lm.feetY - 10);
    ctx.lineTo(lm.bodyCX - 48, lm.feetY - 10);
    ctx.closePath(); ctx.fill();
    // Belt rope
    ctx.strokeStyle = '#d7ccc8'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(lm.bodyCX - 45, lm.waistY);
    ctx.lineTo(lm.bodyCX + 45, lm.waistY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lm.bodyCX + 20, lm.waistY);
    ctx.lineTo(lm.bodyCX + 15, lm.waistY + 30); ctx.stroke();
    // Hood
    ctx.fillStyle = 'rgba(93, 64, 55, 0.8)';
    ctx.beginPath();
    ctx.moveTo(lm.headCX - 55, lm.headCY + 10);
    ctx.quadraticCurveTo(lm.headCX, lm.headTopY - 50, lm.headCX + 55, lm.headCY + 10);
    ctx.lineTo(lm.headCX + 58, lm.headCY + 25);
    ctx.quadraticCurveTo(lm.headCX, lm.headTopY - 35, lm.headCX - 58, lm.headCY + 25);
    ctx.closePath(); ctx.fill();
  }

  if (currentSkin === 'ciclista') {
    // Jersey
    ctx.fillStyle = 'rgba(253, 216, 53, 0.88)';
    ctx.beginPath();
    ctx.moveTo(lm.bodyCX - 50, lm.shoulderY);
    ctx.lineTo(lm.bodyCX + 50, lm.shoulderY);
    ctx.lineTo(lm.bodyCX + 42, lm.waistY + 5);
    ctx.lineTo(lm.bodyCX - 42, lm.waistY + 5);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(245, 127, 23, 0.9)';
    ctx.fillRect(lm.bodyCX - 45, lm.shoulderY + 25, 90, 7);
    ctx.fillRect(lm.bodyCX - 45, lm.shoulderY + 45, 90, 7);
    ctx.fillStyle = '#212121'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('69', lm.bodyCX, lm.shoulderY + 22);
    // Shorts
    ctx.fillStyle = 'rgba(33,33,33,0.85)';
    ctx.fillRect(lm.bodyCX - 42, lm.waistY + 5, 84, 30);
    // Helmet
    ctx.fillStyle = 'rgba(38,50,56,0.9)';
    ctx.beginPath();
    ctx.ellipse(lm.headCX, lm.headTopY + 15, 52, 30, 0, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#37474f';
    for (let i = -2; i <= 2; i++) ctx.fillRect(lm.headCX + i * 14 - 3, lm.headTopY - 10, 6, 14);
    ctx.fillStyle = 'rgba(0,188,212,0.45)';
    ctx.beginPath();
    ctx.ellipse(lm.headCX, lm.headTopY + 20, 54, 8, 0, 0, Math.PI); ctx.fill();
  }

  if (currentSkin === 'maraton') {
    // Singlet
    ctx.fillStyle = 'rgba(229,57,53,0.85)';
    ctx.beginPath();
    ctx.moveTo(lm.bodyCX - 42, lm.shoulderY);
    ctx.lineTo(lm.bodyCX + 42, lm.shoulderY);
    ctx.lineTo(lm.bodyCX + 38, lm.waistY);
    ctx.lineTo(lm.bodyCX - 38, lm.waistY);
    ctx.closePath(); ctx.fill();
    // Race number
    ctx.fillStyle = '#fff';
    ctx.fillRect(lm.bodyCX - 22, lm.shoulderY + 10, 44, 28);
    ctx.fillStyle = '#000'; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center';
    ctx.fillText('502', lm.bodyCX, lm.shoulderY + 32);
    // Shorts
    ctx.fillStyle = 'rgba(26,35,126,0.85)';
    ctx.fillRect(lm.bodyCX - 40, lm.waistY, 80, 25);
    // Headband
    ctx.fillStyle = 'rgba(229,57,53,0.9)';
    ctx.fillRect(lm.headCX - 48, lm.headTopY + 20, 96, 8);
    // Sweat
    ctx.fillStyle = 'rgba(41,182,246,0.6)';
    const swY = (Date.now() / 12) % 50;
    ctx.beginPath(); ctx.arc(lm.headCX - 45, lm.headTopY + 35 + swY, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(lm.headCX + 47, lm.headTopY + 40 + swY * 0.7, 2.5, 0, Math.PI * 2); ctx.fill();
  }

  if (currentSkin === 'jurassic') {
    // Khaki vest
    ctx.fillStyle = 'rgba(161,136,127,0.88)';
    ctx.beginPath();
    ctx.moveTo(lm.bodyCX - 52, lm.shoulderY);
    ctx.lineTo(lm.bodyCX + 52, lm.shoulderY);
    ctx.lineTo(lm.bodyCX + 45, lm.waistY + 15);
    ctx.lineTo(lm.bodyCX - 45, lm.waistY + 15);
    ctx.closePath(); ctx.fill();
    // Pockets
    ctx.strokeStyle = '#795548'; ctx.lineWidth = 1.5;
    ctx.strokeRect(lm.bodyCX - 35, lm.waistY - 20, 22, 16);
    ctx.strokeRect(lm.bodyCX + 13, lm.waistY - 20, 22, 16);
    // Khaki shorts
    ctx.fillStyle = 'rgba(188,170,164,0.85)';
    ctx.fillRect(lm.bodyCX - 42, lm.waistY + 15, 84, 22);
    // InGen badge
    ctx.fillStyle = '#fff'; ctx.fillRect(lm.bodyCX + 16, lm.shoulderY + 5, 28, 14);
    ctx.fillStyle = '#e53935'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('InGen', lm.bodyCX + 30, lm.shoulderY + 15);
    // Safari hat
    ctx.fillStyle = 'rgba(141,110,99,0.9)';
    ctx.beginPath(); ctx.ellipse(lm.headCX, lm.headTopY + 10, 58, 11, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#795548';
    ctx.beginPath(); ctx.ellipse(lm.headCX, lm.headTopY + 2, 38, 20, 0, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#4e342e'; ctx.fillRect(lm.headCX - 38, lm.headTopY + 4, 76, 5);
  }

  if (currentSkin === 'torero') {
    // Traje de luces
    ctx.fillStyle = 'rgba(183,28,28,0.88)';
    ctx.beginPath();
    ctx.moveTo(lm.bodyCX - 52, lm.shoulderY);
    ctx.lineTo(lm.bodyCX + 52, lm.shoulderY);
    ctx.lineTo(lm.bodyCX + 44, lm.waistY + 8);
    ctx.lineTo(lm.bodyCX - 44, lm.waistY + 8);
    ctx.closePath(); ctx.fill();
    // Gold trim
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2.5;
    ctx.strokeRect(lm.bodyCX - 50, lm.shoulderY + 2, 100, lm.waistY - lm.shoulderY + 4);
    // Epaulettes
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(lm.bodyCX - 50, lm.shoulderY + 8, 9, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(lm.bodyCX + 50, lm.shoulderY + 8, 9, 0, Math.PI * 2); ctx.fill();
    // Tight pants with gold stripes
    ctx.fillStyle = 'rgba(136,14,79,0.85)';
    ctx.fillRect(lm.bodyCX - 38, lm.waistY + 8, 76, 50);
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(lm.bodyCX - 38, lm.waistY + 8, 3, 50);
    ctx.fillRect(lm.bodyCX + 35, lm.waistY + 8, 3, 50);
    // Montera
    ctx.fillStyle = 'rgba(26,26,26,0.9)';
    ctx.beginPath(); ctx.ellipse(lm.headCX, lm.headTopY + 8, 46, 13, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(lm.headCX, lm.headTopY - 2, 32, 22, 0, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.arc(lm.headCX - 33, lm.headTopY + 12, 9, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(lm.headCX + 33, lm.headTopY + 12, 9, 0, Math.PI * 2); ctx.fill();
    // Cape (animated)
    const capeSwing = Math.sin(Date.now() / 400) * 12;
    ctx.fillStyle = 'rgba(233,30,99,0.6)';
    ctx.beginPath();
    ctx.moveTo(lm.bodyCX + 55, lm.shoulderY + 15);
    ctx.quadraticCurveTo(lm.bodyCX + 130, lm.bodyCY + capeSwing, lm.bodyCX + 95, lm.feetY);
    ctx.quadraticCurveTo(lm.bodyCX + 70, lm.feetY - 20, lm.bodyCX + 55, lm.waistY + 20);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,215,0,0.35)';
    ctx.beginPath();
    ctx.moveTo(lm.bodyCX + 60, lm.shoulderY + 25);
    ctx.quadraticCurveTo(lm.bodyCX + 120, lm.bodyCY + capeSwing * 0.8, lm.bodyCX + 88, lm.feetY - 10);
    ctx.quadraticCurveTo(lm.bodyCX + 68, lm.feetY - 30, lm.bodyCX + 60, lm.waistY + 25);
    ctx.closePath(); ctx.fill();
  }

  if (currentSkin === 'f1') {
    // Race suit
    ctx.fillStyle = 'rgba(211,47,47,0.88)';
    ctx.beginPath();
    ctx.moveTo(lm.bodyCX - 52, lm.shoulderY);
    ctx.lineTo(lm.bodyCX + 52, lm.shoulderY);
    ctx.lineTo(lm.bodyCX + 45, lm.feetY - 10);
    ctx.lineTo(lm.bodyCX - 45, lm.feetY - 10);
    ctx.closePath(); ctx.fill();
    // White stripe
    ctx.fillStyle = '#fff'; ctx.fillRect(lm.bodyCX - 5, lm.shoulderY, 10, lm.feetY - lm.shoulderY - 10);
    // Ferrari text
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Ferrari', lm.bodyCX, lm.shoulderY + 20);
    // Sponsors
    ctx.fillStyle = '#fff'; ctx.font = '8px sans-serif';
    ctx.fillText('Shell', lm.bodyCX - 25, lm.waistY - 5);
    ctx.fillText('UPS', lm.bodyCX + 25, lm.waistY - 5);
    ctx.font = '20px sans-serif'; ctx.fillText('🐴', lm.bodyCX, lm.waistY + 20);
    // Helmet
    ctx.fillStyle = 'rgba(211,47,47,0.92)';
    ctx.beginPath(); ctx.ellipse(lm.headCX, lm.headTopY + 10, 52, 38, 0, Math.PI, 0); ctx.fill();
    // Visor
    ctx.fillStyle = 'rgba(33,33,33,0.65)';
    ctx.beginPath(); ctx.ellipse(lm.headCX, lm.headTopY + 18, 46, 13, 0, 0, Math.PI * 0.85); ctx.fill();
    // Number
    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('16', lm.headCX, lm.headTopY);
  }

  ctx.restore();

  // Speech bubble (not affected by bounce)
  mouthPhase += 0.03;
  const talking = Math.sin(mouthPhase * 3) > 0.3;
  const phrases = {
    toddler: '¡No soy\nel mamá!',
    monje: 'Om...\nnamaste',
    ciclista: '¡Allez\nallez!',
    maraton: '¡Ya casi\nllego!',
    jurassic: '¡Clever\ngirl!',
    torero: '¡Olé!\n¡Torero!',
    f1: '¡Forza\nFerrari!',
    base: '¡Soy el\nGordo!'
  };
  if (talking) {
    const bx = lm.headCX + 50, byy = lm.headTopY - 20 + by;
    ctx.fillStyle = '#fff';
    // Pointer
    ctx.beginPath();
    ctx.moveTo(bx - 5, byy + 40);
    ctx.lineTo(bx - 15, byy + 55);
    ctx.lineTo(bx + 5, byy + 45);
    ctx.closePath(); ctx.fill();
    // Bubble
    roundRect(ctx, bx - 5, byy - 5, 115, 48, 10); ctx.fill();
    ctx.fillStyle = '#333'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
    const lines = (phrases[currentSkin] || '¡Hola!').split('\n');
    lines.forEach((line, i) => ctx.fillText(line, bx + 52, byy + 15 + i * 16));
  }

  // Label
  const labels = {
    toddler: 'BEBÉ SINCLAIR', monje: 'MONJE ZEN', ciclista: 'CICLISTA PRO',
    maraton: 'MARATONISTA', jurassic: 'EXPLORER', torero: 'EL TORERO',
    f1: 'SCUDERIA GORDO', base: 'AL NATURAL'
  };
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  roundRect(ctx, W/2 - 75, H - 38, 150, 30, 8); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(labels[currentSkin] || '', W/2, H - 18);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function animate() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawSceneBackground();
  if (loaded) {
    drawDinoImage();
    drawSkinOverlays();
  } else {
    ctx.fillStyle = '#fff'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Cargando al Gordo...', W/2, H/2);
  }
  requestAnimationFrame(animate);
}
animate();
</script>
