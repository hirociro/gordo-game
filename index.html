<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bebé Sinclair - Skin Selector</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
    overflow-x: hidden;
  }
  h1 { margin-top: 18px; font-size: 1.8em; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
  .subtitle { font-size: 0.85em; opacity: 0.7; margin-bottom: 10px; }
  .stage {
    position: relative;
    width: 340px;
    height: 450px;
    margin: 8px auto;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  canvas { display: block; }
  .skin-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    max-width: 380px;
    padding: 10px;
  }
  .skin-btn {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 10px 6px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 0.75em;
    text-align: center;
    transition: all 0.2s;
  }
  .skin-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
  .skin-btn.active { border-color: #e94560; background: rgba(233,69,96,0.3); }
  .skin-btn .icon { font-size: 1.8em; display: block; margin-bottom: 4px; }
  .credits { margin-top: auto; padding: 12px; opacity: 0.4; font-size: 0.7em; }
</style>
</head>
<body>
<h1>Bebé Sinclair</h1>
<p class="subtitle">a.k.a. El Gordo Bolaños</p>
<div class="stage">
  <canvas id="c" width="340" height="450"></canvas>
</div>
<div class="skin-grid">
  <button class="skin-btn active" onclick="setSkin('toddler')"><span class="icon">👶</span>Bebé</button>
  <button class="skin-btn" onclick="setSkin('monje')"><span class="icon">🧘</span>Monje</button>
  <button class="skin-btn" onclick="setSkin('ciclista')"><span class="icon">🚴</span>Ciclista</button>
  <button class="skin-btn" onclick="setSkin('maraton')"><span class="icon">🏃</span>Maratón</button>
  <button class="skin-btn" onclick="setSkin('jurassic')"><span class="icon">🦖</span>Jurassic</button>
  <button class="skin-btn" onclick="setSkin('torero')"><span class="icon">🇪🇸</span>Torero</button>
  <button class="skin-btn" onclick="setSkin('f1')"><span class="icon">🏎️</span>F1 Ferrari</button>
  <button class="skin-btn" onclick="setSkin('base')"><span class="icon">🦕</span>Desnudo</button>
</div>
<p class="credits">Hecho con cariño para el grupo Debates</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 340, H = 450;
let currentSkin = 'toddler';
let mouthPhase = 0;
let bounce = 0, bounceDir = 1;
let dinoImg = null;
let loaded = false;

// Load image - try local first, then Pinterest
const img = new Image();
img.crossOrigin = 'anonymous';
img.onload = () => { dinoImg = img; loaded = true; };
img.onerror = () => {
  const img2 = new Image();
  img2.onload = () => { dinoImg = img2; loaded = true; };
  img2.src = 'baby.jpg';
};
img.src = 'baby.jpg';

function setSkin(s) {
  currentSkin = s;
  document.querySelectorAll('.skin-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

/*
  Image: 736x717. Canvas: 340x450.
  scale = 340/736 = 0.4620
  drawH = 717 * 0.4620 = 331.2
  offsetY = (450 - 331.2) / 2 - 10 = 49.4

  Body landmarks measured from actual image (canvas coords):
*/
const L = {
  cx: 170,            // body center X
  headTopY: 63,       // top of skull/spikes
  foreheadY: 99,      // forehead
  eyeY: 132,          // eye line
  mouthY: 165,        // mouth
  chinY: 182,         // chin
  shoulderY: 202,     // shoulders
  chestY: 232,        // mid-chest
  waistY: 255,        // belly/waist
  diaperTopY: 271,    // top of diaper
  crotchY: 298,       // crotch
  kneeY: 321,         // knees
  feetY: 357,         // feet
  torsoHalf: 51,      // half-width of torso
};

function drawBackground() {
  const bgs = {
    toddler: ['#ffe6f0','#ffd6e7'], monje: ['#2d1b00','#5c3a1e'],
    ciclista: ['#e0f7fa','#80deea'], maraton: ['#fff3e0','#ffcc80'],
    jurassic: ['#1b5e20','#2e7d32'], torero: ['#b71c1c','#e53935'],
    f1: ['#37474f','#263238'], base: ['#a5d6a7','#66bb6a']
  };
  const bg = bgs[currentSkin] || bgs.base;
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, bg[0]); grd.addColorStop(1, bg[1]);
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
}

function drawSceneDecor() {
  if (currentSkin === 'jurassic') {
    ctx.fillStyle = '#2e7d32';
    for (let i = 0; i < 6; i++) {
      const tx = i * 65 + 15;
      ctx.fillRect(tx, 50, 6, 40);
      ctx.beginPath(); ctx.arc(tx + 3, 46, 20, 0, Math.PI * 2); ctx.fill();
    }
    ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 3;
    for (let i = 0; i < 9; i++) ctx.strokeRect(i * 42 + 5, H - 75, 4, 40);
    ctx.beginPath(); ctx.moveTo(0, H - 58); ctx.lineTo(W, H - 58); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, H - 42); ctx.lineTo(W, H - 42); ctx.stroke();
  }
  if (currentSkin === 'f1') {
    ctx.fillStyle = '#424242'; ctx.fillRect(0, H - 65, W, 65);
    ctx.setLineDash([18, 12]); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, H - 32); ctx.lineTo(W, H - 32); ctx.stroke();
    ctx.setLineDash([]);
    const sz = 11;
    for (let r = 0; r < 2; r++) for (let c = 0; c < Math.ceil(W/sz); c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? '#fff' : '#111';
      ctx.fillRect(c * sz, r * sz, sz, sz);
    }
  }
  if (currentSkin === 'torero') {
    ctx.fillStyle = '#d4a056'; ctx.fillRect(0, H - 75, W, 75);
    ctx.fillStyle = '#c49046';
    ctx.beginPath(); ctx.ellipse(W/2, H - 55, 155, 28, 0, 0, Math.PI * 2); ctx.fill();
  }
  if (currentSkin === 'maraton') {
    ctx.fillStyle = '#616161'; ctx.fillRect(0, H - 55, W, 55);
    ctx.setLineDash([12, 8]); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, H - 28); ctx.lineTo(W, H - 28); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#1565c0'; ctx.fillRect(0, 0, W, 26);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('META - 42.195 KM', W/2, 18);
  }
  if (currentSkin === 'ciclista') {
    ctx.fillStyle = '#4dd0e1';
    ctx.beginPath();
    ctx.moveTo(0, 100); ctx.lineTo(55, 35); ctx.lineTo(110, 85);
    ctx.lineTo(170, 25); ctx.lineTo(240, 75); ctx.lineTo(310, 42); ctx.lineTo(W, 95);
    ctx.lineTo(W, 130); ctx.lineTo(0, 130); ctx.fill();
    ctx.fillStyle = '#616161'; ctx.fillRect(0, H - 45, W, 45);
  }
  if (currentSkin === 'monje') {
    ctx.fillStyle = '#4e342e'; ctx.fillRect(0, H - 45, W, 45);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(W/2, H/2, 120, -0.3, Math.PI * 1.7); ctx.stroke();
    for (let x of [35, W - 35]) {
      ctx.fillStyle = '#fff3e0'; ctx.fillRect(x - 3, H - 72, 6, 26);
      ctx.fillStyle = '#ff9800'; ctx.beginPath(); ctx.ellipse(x, H - 77, 4, 7, 0, 0, Math.PI * 2); ctx.fill();
    }
  }
}

function drawDinoImage() {
  if (!dinoImg) return;
  const scale = W / dinoImg.naturalWidth;
  const drawH2 = dinoImg.naturalHeight * scale;
  const offsetY = (H - drawH2) / 2 - 10;
  bounce += 0.4 * bounceDir;
  if (bounce > 3 || bounce < -3) bounceDir *= -1;
  ctx.save();
  ctx.translate(0, bounce);
  ctx.drawImage(dinoImg, 0, offsetY, W, drawH2);
  ctx.restore();
}

function drawClothing() {
  const by = bounce;
  ctx.save();
  ctx.translate(0, by);

  const cx = L.cx;
  const tw = L.torsoHalf; // 51px half-width

  // ============ TODDLER ============
  if (currentSkin === 'toddler') {
    // Bib hanging from neck to mid-chest
    ctx.fillStyle = 'rgba(255, 215, 0, 0.85)';
    ctx.beginPath();
    ctx.moveTo(cx - 25, L.shoulderY - 5);
    ctx.lineTo(cx + 25, L.shoulderY - 5);
    ctx.lineTo(cx + 20, L.chestY + 5);
    ctx.arc(cx, L.chestY + 5, 20, 0, Math.PI);
    ctx.closePath(); ctx.fill();
    // Bib border
    ctx.strokeStyle = 'rgba(218, 165, 32, 0.9)'; ctx.lineWidth = 1.5;
    ctx.stroke();
    // Bib text
    ctx.fillStyle = '#c62828';
    ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('NOT THE', cx, L.shoulderY + 12);
    ctx.fillText('MAMA!', cx, L.shoulderY + 24);
  }

  // ============ MONJE ============
  if (currentSkin === 'monje') {
    // Brown robe covering torso - shaped to body
    ctx.fillStyle = 'rgba(93, 64, 55, 0.80)';
    ctx.beginPath();
    ctx.moveTo(cx - tw + 5, L.chinY + 5);  // starts at neckline
    ctx.lineTo(cx + tw - 5, L.chinY + 5);
    ctx.lineTo(cx + tw + 3, L.shoulderY + 5); // widens at shoulders
    ctx.lineTo(cx + tw + 5, L.crotchY);       // down to legs
    ctx.lineTo(cx - tw - 5, L.crotchY);
    ctx.lineTo(cx - tw - 3, L.shoulderY + 5);
    ctx.closePath(); ctx.fill();
    // V-neck opening
    ctx.fillStyle = 'rgba(93, 64, 55, 0)'; // transparent V
    ctx.beginPath();
    ctx.moveTo(cx - 15, L.chinY + 5);
    ctx.lineTo(cx, L.chestY - 5);
    ctx.lineTo(cx + 15, L.chinY + 5);
    ctx.closePath();
    ctx.fillStyle = 'rgba(0,0,0,0)';
    // Rope belt at waist
    ctx.strokeStyle = '#d7ccc8'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx - tw, L.waistY + 3);
    ctx.lineTo(cx + tw, L.waistY + 3); ctx.stroke();
    // Hanging rope end
    ctx.beginPath(); ctx.moveTo(cx + 18, L.waistY + 3);
    ctx.quadraticCurveTo(cx + 22, L.waistY + 15, cx + 14, L.waistY + 25); ctx.stroke();
    // Hood sitting behind/on top of head
    ctx.fillStyle = 'rgba(93, 64, 55, 0.7)';
    ctx.beginPath();
    ctx.moveTo(cx - 48, L.eyeY - 5);
    ctx.quadraticCurveTo(cx, L.headTopY - 40, cx + 48, L.eyeY - 5);
    ctx.lineTo(cx + 50, L.eyeY + 8);
    ctx.quadraticCurveTo(cx, L.headTopY - 25, cx - 50, L.eyeY + 8);
    ctx.closePath(); ctx.fill();
  }

  // ============ CICLISTA ============
  if (currentSkin === 'ciclista') {
    // Yellow jersey - fitted to torso
    ctx.fillStyle = 'rgba(253, 216, 53, 0.82)';
    ctx.beginPath();
    ctx.moveTo(cx - tw + 3, L.shoulderY + 3);
    ctx.quadraticCurveTo(cx, L.shoulderY - 2, cx + tw - 3, L.shoulderY + 3);
    ctx.lineTo(cx + tw, L.waistY + 5);
    ctx.lineTo(cx - tw, L.waistY + 5);
    ctx.closePath(); ctx.fill();
    // Horizontal stripes
    ctx.fillStyle = 'rgba(245, 127, 23, 0.8)';
    const stripeW = tw * 2 - 6;
    ctx.fillRect(cx - tw + 3, L.chestY - 3, stripeW, 5);
    ctx.fillRect(cx - tw + 3, L.chestY + 14, stripeW, 5);
    // Number on chest
    ctx.fillStyle = '#212121'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('69', cx, L.chestY - 7);
    // Black shorts
    ctx.fillStyle = 'rgba(33, 33, 33, 0.78)';
    ctx.fillRect(cx - tw + 2, L.waistY + 5, tw * 2 - 4, L.diaperTopY - L.waistY + 5);
    // Aero helmet - elongated shape on head
    ctx.fillStyle = 'rgba(38, 50, 56, 0.88)';
    ctx.beginPath();
    ctx.ellipse(cx, L.foreheadY - 5, 50, 28, 0, Math.PI + 0.2, -0.2); ctx.fill();
    // Helmet tail
    ctx.beginPath();
    ctx.moveTo(cx + 25, L.foreheadY - 25);
    ctx.quadraticCurveTo(cx + 55, L.foreheadY - 30, cx + 45, L.foreheadY - 10);
    ctx.lineTo(cx + 30, L.foreheadY - 8);
    ctx.closePath(); ctx.fill();
    // Visor strip
    ctx.fillStyle = 'rgba(0, 188, 212, 0.4)';
    ctx.beginPath(); ctx.ellipse(cx, L.foreheadY + 2, 48, 6, 0, 0, Math.PI); ctx.fill();
  }

  // ============ MARATON ============
  if (currentSkin === 'maraton') {
    // Running singlet
    ctx.fillStyle = 'rgba(229, 57, 53, 0.80)';
    ctx.beginPath();
    ctx.moveTo(cx - tw + 8, L.shoulderY + 3);
    ctx.lineTo(cx + tw - 8, L.shoulderY + 3);
    ctx.lineTo(cx + tw - 5, L.waistY + 3);
    ctx.lineTo(cx - tw + 5, L.waistY + 3);
    ctx.closePath(); ctx.fill();
    // Race bib
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 20, L.chestY - 8, 40, 24);
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 0.5;
    ctx.strokeRect(cx - 20, L.chestY - 8, 40, 24);
    ctx.fillStyle = '#000'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
    ctx.fillText('502', cx, L.chestY + 11);
    // Running shorts
    ctx.fillStyle = 'rgba(26, 35, 126, 0.78)';
    ctx.fillRect(cx - tw + 4, L.waistY + 3, tw * 2 - 8, L.diaperTopY - L.waistY + 8);
    // Headband
    ctx.fillStyle = 'rgba(229, 57, 53, 0.85)';
    ctx.fillRect(cx - 48, L.foreheadY - 2, 96, 7);
    // Sweat drops animating down
    ctx.fillStyle = 'rgba(41, 182, 246, 0.5)';
    const sw = (Date.now() / 14) % 50;
    ctx.beginPath(); ctx.arc(cx - 46, L.foreheadY + 10 + sw, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 48, L.foreheadY + 15 + sw * 0.6, 2, 0, Math.PI * 2); ctx.fill();
  }

  // ============ JURASSIC PARK ============
  if (currentSkin === 'jurassic') {
    // Khaki utility vest
    ctx.fillStyle = 'rgba(161, 136, 127, 0.82)';
    ctx.beginPath();
    ctx.moveTo(cx - tw, L.shoulderY + 2);
    ctx.lineTo(cx + tw, L.shoulderY + 2);
    ctx.lineTo(cx + tw - 2, L.diaperTopY + 5);
    ctx.lineTo(cx - tw + 2, L.diaperTopY + 5);
    ctx.closePath(); ctx.fill();
    // Vest opening (V shape in front)
    ctx.strokeStyle = '#795548'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx - 5, L.shoulderY + 2);
    ctx.lineTo(cx, L.chestY + 5);
    ctx.lineTo(cx + 5, L.shoulderY + 2); ctx.stroke();
    // Chest pockets
    ctx.strokeRect(cx - tw + 6, L.chestY - 5, 18, 14);
    ctx.strokeRect(cx + tw - 24, L.chestY - 5, 18, 14);
    // Pocket flaps
    ctx.fillStyle = 'rgba(121, 85, 72, 0.5)';
    ctx.fillRect(cx - tw + 6, L.chestY - 5, 18, 4);
    ctx.fillRect(cx + tw - 24, L.chestY - 5, 18, 4);
    // InGen badge on right chest
    ctx.fillStyle = '#fff'; ctx.fillRect(cx + 14, L.shoulderY + 6, 26, 12);
    ctx.fillStyle = '#e53935'; ctx.font = 'bold 7px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('InGen', cx + 27, L.shoulderY + 15);
    // Khaki shorts
    ctx.fillStyle = 'rgba(188, 170, 164, 0.78)';
    ctx.fillRect(cx - tw + 3, L.diaperTopY + 5, tw * 2 - 6, L.crotchY - L.diaperTopY);
    // Safari hat - wide brim sitting on head
    ctx.fillStyle = 'rgba(141, 110, 99, 0.88)';
    ctx.beginPath(); ctx.ellipse(cx, L.foreheadY - 8, 58, 10, 0, 0, Math.PI * 2); ctx.fill();
    // Hat dome
    ctx.fillStyle = 'rgba(121, 85, 72, 0.88)';
    ctx.beginPath(); ctx.ellipse(cx, L.foreheadY - 16, 36, 18, 0, Math.PI, 0); ctx.fill();
    // Hat band
    ctx.fillStyle = '#4e342e'; ctx.fillRect(cx - 36, L.foreheadY - 13, 72, 4);
  }

  // ============ TORERO ============
  if (currentSkin === 'torero') {
    // Traje de luces jacket - fitted
    ctx.fillStyle = 'rgba(183, 28, 28, 0.82)';
    ctx.beginPath();
    ctx.moveTo(cx - tw - 2, L.shoulderY);
    ctx.lineTo(cx + tw + 2, L.shoulderY);
    ctx.lineTo(cx + tw, L.waistY + 8);
    ctx.lineTo(cx - tw, L.waistY + 8);
    ctx.closePath(); ctx.fill();
    // Gold embroidery trim
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
    ctx.strokeRect(cx - tw, L.shoulderY + 1, tw * 2, L.waistY - L.shoulderY + 6);
    // Cross pattern on chest
    ctx.beginPath(); ctx.moveTo(cx, L.shoulderY + 3); ctx.lineTo(cx, L.waistY + 5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - 25, L.chestY); ctx.lineTo(cx + 25, L.chestY); ctx.stroke();
    // Epaulettes (gold shoulder pads)
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(cx - tw - 3, L.shoulderY + 5, 8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + tw + 3, L.shoulderY + 5, 8, 0, Math.PI * 2); ctx.fill();
    // Gold tassels on epaulettes
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath(); ctx.moveTo(cx - tw - 8 + i * 3, L.shoulderY + 12);
      ctx.lineTo(cx - tw - 8 + i * 3, L.shoulderY + 20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx + tw - 1 + i * 3, L.shoulderY + 12);
      ctx.lineTo(cx + tw - 1 + i * 3, L.shoulderY + 20); ctx.stroke();
    }
    // Tight pants
    ctx.fillStyle = 'rgba(136, 14, 79, 0.80)';
    ctx.fillRect(cx - tw + 3, L.waistY + 8, tw * 2 - 6, L.crotchY - L.waistY);
    // Gold side stripes on pants
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(cx - tw + 3, L.waistY + 8, 3, L.crotchY - L.waistY);
    ctx.fillRect(cx + tw - 6, L.waistY + 8, 3, L.crotchY - L.waistY);
    // Montera (bullfighter hat)
    ctx.fillStyle = 'rgba(26, 26, 26, 0.88)';
    // Brim
    ctx.beginPath(); ctx.ellipse(cx, L.foreheadY - 6, 48, 12, 0, 0, Math.PI * 2); ctx.fill();
    // Dome
    ctx.beginPath(); ctx.ellipse(cx, L.foreheadY - 15, 32, 20, 0, Math.PI, 0); ctx.fill();
    // Side pompoms
    ctx.beginPath(); ctx.arc(cx - 36, L.foreheadY, 8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 36, L.foreheadY, 8, 0, Math.PI * 2); ctx.fill();
    // Cape (animated swing)
    const capeSwing = Math.sin(Date.now() / 400) * 12;
    // Main cape (magenta)
    ctx.fillStyle = 'rgba(233, 30, 99, 0.5)';
    ctx.beginPath();
    ctx.moveTo(cx + tw + 8, L.shoulderY + 10);
    ctx.quadraticCurveTo(cx + 125, L.waistY + capeSwing, cx + 95, L.feetY - 5);
    ctx.quadraticCurveTo(cx + 70, L.feetY - 25, cx + tw + 8, L.waistY + 15);
    ctx.closePath(); ctx.fill();
    // Cape inner lining (gold)
    ctx.fillStyle = 'rgba(255, 215, 0, 0.25)';
    ctx.beginPath();
    ctx.moveTo(cx + tw + 13, L.shoulderY + 20);
    ctx.quadraticCurveTo(cx + 115, L.waistY + capeSwing * 0.7, cx + 88, L.feetY - 15);
    ctx.quadraticCurveTo(cx + 68, L.feetY - 30, cx + tw + 13, L.waistY + 20);
    ctx.closePath(); ctx.fill();
  }

  // ============ F1 FERRARI ============
  if (currentSkin === 'f1') {
    // Full race suit - one piece from shoulders to legs
    ctx.fillStyle = 'rgba(211, 47, 47, 0.82)';
    ctx.beginPath();
    ctx.moveTo(cx - tw, L.shoulderY + 2);
    ctx.lineTo(cx + tw, L.shoulderY + 2);
    ctx.lineTo(cx + tw - 2, L.crotchY + 5);
    ctx.lineTo(cx - tw + 2, L.crotchY + 5);
    ctx.closePath(); ctx.fill();
    // White center stripe
    ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
    ctx.fillRect(cx - 4, L.shoulderY + 2, 8, L.crotchY - L.shoulderY + 3);
    // Ferrari logo
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Ferrari', cx, L.shoulderY + 16);
    // Scuderia badge
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(cx, L.chestY + 5, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#c62828';
    ctx.font = '12px sans-serif'; ctx.fillText('🐴', cx, L.chestY + 10);
    // Sponsors
    ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = '7px sans-serif';
    ctx.fillText('Shell', cx - 25, L.waistY - 2);
    ctx.fillText('UPS', cx + 25, L.waistY - 2);
    // Race helmet - dome on top of head
    ctx.fillStyle = 'rgba(211, 47, 47, 0.9)';
    ctx.beginPath();
    ctx.ellipse(cx, L.foreheadY - 5, 50, 32, 0, Math.PI, 0); ctx.fill();
    // Visor (dark, across eye area)
    ctx.fillStyle = 'rgba(33, 33, 33, 0.55)';
    ctx.beginPath();
    ctx.ellipse(cx, L.foreheadY + 3, 46, 11, 0, -0.1, Math.PI + 0.1); ctx.fill();
    // Helmet number
    ctx.fillStyle = '#fff'; ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('16', cx, L.foreheadY - 15);
    // Visor reflection
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.ellipse(cx - 10, L.foreheadY, 15, 4, -0.3, 0, Math.PI * 2); ctx.fill();
  }

  ctx.restore();

  // ===== SPEECH BUBBLE (outside bounce) =====
  mouthPhase += 0.03;
  const talking = Math.sin(mouthPhase * 3) > 0.3;
  const phrases = {
    toddler: '¡No soy\nel mamá!', monje: 'Om...\nnamaste',
    ciclista: '¡Allez\nallez!', maraton: '¡Ya casi\nllego!',
    jurassic: '¡Clever\ngirl!', torero: '¡Olé!\n¡Torero!',
    f1: '¡Forza\nFerrari!', base: '¡Soy el\nGordo!'
  };
  if (talking) {
    const bx = cx + 55, byy = L.headTopY - 25 + by;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(bx - 8, byy + 42);
    ctx.lineTo(bx - 20, byy + 56);
    ctx.lineTo(bx + 2, byy + 47);
    ctx.closePath(); ctx.fill();
    roundRect(ctx, bx - 8, byy, 110, 44, 10); ctx.fill();
    ctx.fillStyle = '#333'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    const lines = (phrases[currentSkin] || '').split('\n');
    lines.forEach((line, i) => ctx.fillText(line, bx + 47, byy + 17 + i * 15));
  }

  // ===== LABEL =====
  const labels = {
    toddler: 'BEBÉ SINCLAIR', monje: 'MONJE ZEN', ciclista: 'CICLISTA PRO',
    maraton: 'MARATONISTA', jurassic: 'EXPLORER', torero: 'EL TORERO',
    f1: 'SCUDERIA GORDO', base: 'AL NATURAL'
  };
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  roundRect(ctx, W/2 - 75, H - 38, 150, 30, 8); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(labels[currentSkin] || '', W/2, H - 18);
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath(); c.moveTo(x + r, y); c.lineTo(x + w - r, y);
  c.arcTo(x + w, y, x + w, y + r, r); c.lineTo(x + w, y + h - r);
  c.arcTo(x + w, y + h, x + w - r, y + h, r); c.lineTo(x + r, y + h);
  c.arcTo(x, y + h, x, y + h - r, r); c.lineTo(x, y + r);
  c.arcTo(x, y, x + r, y, r); c.closePath();
}

function animate() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawSceneDecor();
  if (loaded) { drawDinoImage(); drawClothing(); }
  else {
    ctx.fillStyle = '#fff'; ctx.font = '15px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Cargando al Gordo...', W/2, H/2);
  }
  requestAnimationFrame(animate);
}
animate();
</script>
